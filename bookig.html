<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gandhi Museum VR Booking</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = "https://sheetdb.io/api/v1/rolrp46ju7n6y";

        const SLOT_DATA = [
            { id: 1, time: "07:00 AM" }, { id: 2, time: "07:30 AM" },
            { id: 3, time: "08:00 AM" }, { id: 4, time: "08:30 AM" },
            { id: 5, time: "09:00 AM" }, { id: 6, time: "09:30 AM" },
            { id: 7, time: "10:00 AM" }, { id: 8, time: "10:30 AM" },
            { id: 9, time: "11:00 AM" }, { id: 10, time: "11:30 AM" },
            { id: 11, time: "12:00 PM" }, { id: 12, time: "12:30 PM" },
            { id: 13, time: "01:00 PM" }, { id: 14, time: "01:30 PM" },
            { id: 15, time: "02:00 PM" }, { id: 16, time: "02:30 PM" },
            { id: 17, time: "03:00 PM" }, { id: 18, time: "03:30 PM" },
            { id: 19, time: "04:00 PM" }, { id: 20, time: "04:30 PM" },
            { id: 21, time: "05:00 PM" }, { id: 22, time: "05:30 PM" },
            { id: 23, time: "06:00 PM" }, { id: 24, time: "06:30 PM" }
        ];

        const css = `
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --saffron:#D4651A; --gold:#C4901E; --deep:#0D0A06; --khadi:#F4EDD8; --green:#4CAF50; --red:#FF3D3D; }
        body { background: var(--deep); color: var(--khadi); font-family: 'Rajdhani', sans-serif; }
        .app { min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; background: radial-gradient(circle at top, rgba(212,101,26,0.1), transparent); }
        
        .header { width:100%; max-width:850px; text-align:center; margin-bottom:15px; border-bottom:1px solid rgba(212,101,26,0.2); padding-bottom:10px; }
        .header h1 { font-family:'Playfair Display'; font-size:26px; }

        /* 🕒 Timer Styling */
        .timer-box { background: rgba(212,101,26,0.15); border: 1px solid var(--saffron); padding: 5px 12px; border-radius: 20px; color: var(--saffron); font-weight: 700; display: inline-block; margin-top: 10px; font-size: 14px; letter-spacing: 1px; }

        .slot-section { width:100%; max-width:850px; background:rgba(255,255,255,0.02); border:1px solid rgba(212,101,26,0.3); padding:15px; border-radius:10px; margin-bottom:20px; }
        .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; max-height: 220px; overflow-y: auto; padding: 10px; }
        .slot-box { display:flex; flex-direction:column; align-items:center; cursor:pointer; }
        .circle { width:36px; height:36px; border-radius:50%; border:2px solid; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; margin-bottom:3px; }
        .circle.free { border-color:var(--green); color:var(--green); }
        .circle.booked { border-color:#444; color:#444; cursor:not-allowed; background:rgba(255,255,255,0.05); }
        .circle.selected { border-color:var(--saffron); background:var(--saffron); color:var(--deep); box-shadow:0 0 10px var(--saffron); }
        .time-label { font-size:8px; color:var(--gold); font-weight:700; text-align:center; }

        .tabs { display:flex; width:100%; max-width:850px; margin-bottom:20px; background:rgba(255,255,255,0.05); }
        .tab-btn { flex:1; padding:15px; border:none; background:transparent; color:rgba(244,237,216,0.4); cursor:pointer; font-weight:700; text-transform:uppercase; font-size:11px; }
        .tab-btn.active { background:var(--saffron); color:var(--deep); }

        .content-card { width:100%; max-width:850px; background:rgba(255,255,255,0.03); border:1px solid rgba(212,101,26,0.2); padding:25px; border-radius:8px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom:15px; }
        @media (max-width: 500px) { .input-row { grid-template-columns: 1fr; } }
        .input-item { margin-bottom:10px; }
        .input-item label { display:block; font-size:9px; color:var(--gold); text-transform:uppercase; margin-bottom:4px; }
        .input-item input { width:100%; padding:11px; background:rgba(0,0,0,0.4); border:1px solid rgba(212,101,26,0.2); color:white; border-radius:4px; outline:none; font-size:14px; }
        .book-btn { width:100%; padding:16px; background:var(--saffron); border:none; color:var(--deep); font-weight:800; text-transform:uppercase; cursor:pointer; border-radius:4px; }
        
        .help-card { background:rgba(212,101,26,0.05); border:1px solid rgba(212,101,26,0.2); padding:15px 20px; margin-bottom:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; }
        .num-box { background: var(--saffron); color: var(--deep); padding: 8px 15px; border-radius: 5px; font-weight: 800; text-decoration: none; font-size: 15px; }
        .ticket-box { border:2px solid var(--saffron); padding:25px; text-align:center; max-width:360px; margin:0 auto; background:var(--deep); border-radius:10px; }
        .blink-warn { color:var(--red); font-weight:700; animation: blinker 0.8s infinite; text-align:center; margin-bottom:15px; }
        @keyframes blinker { 50% { opacity: 0.2; } }
        `;

        function App() {
            const [tab, setTab] = useState("book");
            const [form, setForm] = useState({ fn: "", ln: "", ph: "", em: "", members: "1" });
            const [dbData, setDbData] = useState([]);
            const [sel, setSel] = useState(null);
            const [done, setDone] = useState(false);
            const [curr, setCurr] = useState(null);
            const [loading, setLoading] = useState(true);
            const [countdown, setCountdown] = useState("");

            // 🕒 Live Countdown Logic
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    const target = new Date();
                    target.setHours(18, 30, 0); // Reset Target: 6:30 PM

                    if (now > target) {
                        target.setDate(target.getDate() + 1);
                    }

                    const diff = target - now;
                    const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                    const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                    const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                    
                    setCountdown(`${h}:${m}:${s}`);
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const refresh = async () => {
                try {
                    const r = await fetch(API_URL);
                    const d = await r.json();
                    
                    const now = new Date();
                    const h = now.getHours();
                    const m = now.getMinutes();
                    const currentTime = h + m/60;

                    if (currentTime >= 18.5 || currentTime < 7) {
                        setDbData([]);
                    } else {
                        setDbData(d || []);
                    }
                } catch(e) { console.error(e); }
                setLoading(false);
            };

            useEffect(() => { refresh(); }, []);

            const saveBooking = async () => {
                if (!sel) return alert("Please select a Time Slot!");
                if (form.ph.length !== 10) return alert("Enter 10-digit mobile number!");
                if (parseInt(form.members) > 20) return alert("Max 20 members allowed!");

                setLoading(true);
                const booking = {
                    id: Math.floor(100000 + Math.random()*900000),
                    firstName: form.fn, lastName: form.ln,
                    phone: form.ph, email: form.em || "N/A",
                    members: form.members, slotId: sel.id
                };

                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ data: [booking] })
                    });
                    setCurr(booking);
                    setDone(true);
                    refresh();
                } catch(e) { alert("Server error!"); }
                setLoading(false);
            };

            return (
                <div className="app">
                    <style>{css}</style>
                    <div className="header">
                        <h1>Gandhi Museum <em>VR Show</em></h1>
                        <div className="timer-box">⏳ RESET IN: {countdown}</div>
                    </div>

                    <div className="slot-section">
                        <p style={{fontSize:9, color:'var(--gold)', textAlign:'center', marginBottom:12, letterSpacing:2}}>SELECT SLOT (07:00 AM - 06:30 PM)</p>
                        <div className="slot-grid">
                            {SLOT_DATA.map(s => {
                                const isBooked = dbData.some(b => parseInt(b.slotId) === s.id);
                                return (
                                    <div key={s.id} className="slot-box" onClick={() => !isBooked && setSel(s)}>
                                        <div className={`circle ${isBooked ? 'booked' : sel?.id === s.id ? 'selected' : 'free'}`}>
                                            {isBooked ? "✕" : s.id}
                                        </div>
                                        <div className="time-label">{s.time}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="tabs">
                        <button className={`tab-btn ${tab==='book'?'active':''}`} onClick={()=>setTab('book')}>Booking</button>
                        <button className={`tab-btn ${tab==='rec'?'active':''}`} onClick={()=>setTab('rec')}>Records ({dbData.length})</button>
                        <button className={`tab-btn ${tab==='h'?'active':''}`} onClick={()=>setTab('h')}>Support</button>
                    </div>

                    <div className="content-card">
                        {tab === 'book' ? (
                            !done ? (
                                <>
                                    <div className="input-row">
                                        <div className="input-item"><label>First Name</label><input placeholder="Ex: Mohandas" onChange={e=>setForm({...form, fn:e.target.value})} /></div>
                                        <div className="input-item"><label>Last Name</label><input placeholder="Ex: Gandhi" onChange={e=>setForm({...form, ln:e.target.value})} /></div>
                                    </div>
                                    <div className="input-row">
                                        <div className="input-item"><label>Mobile</label><input maxLength="10" placeholder="98XXXXXXXX" onChange={e=>setForm({...form, ph:e.target.value})} /></div>
                                        <div className="input-item"><label>Total Members (Max 20)</label><input type="number" min="1" max="20" placeholder="Members" onChange={e=>setForm({...form, members:e.target.value})} /></div>
                                    </div>
                                    <div className="input-item"><label>Email (Optional)</label><input placeholder="gandhi@example.com" onChange={e=>setForm({...form, em:e.target.value})} /></div>
                                    <button className="book-btn" onClick={saveBooking}>{loading ? "PROCESSING..." : "Confirm Booking →"}</button>
                                </>
                            ) : (
                                <div>
                                    <p className="blink-warn">⚠️ PLEASE TAKE A SCREENSHOT ⚠️</p>
                                    <div className="ticket-box">
                                        <p style={{fontSize:9, color:'var(--gold)'}}>PASS ID: #{curr.id}</p>
                                        <h2 style={{margin:'10px 0', fontFamily:'Playfair Display'}}>{curr.firstName} {curr.lastName}</h2>
                                        <div style={{color:'var(--saffron)', fontWeight:700, fontSize:18}}>🕐 {SLOT_DATA.find(s=>s.id===curr.slotId)?.time}</div>
                                        <p style={{marginTop:10, fontSize:12}}>Total Members: <strong>{curr.members}</strong></p>
                                    </div>
                                    <button style={{marginTop:20, width:'100%', background:'none', border:'1px solid #444', color:'#888', padding:10}} onClick={()=>window.location.reload()}>+ NEW BOOKING</button>
                                </div>
                            )
                        ) : tab === 'rec' ? (
                            <div>
                                {dbData.map((b, i) => (
                                    <div key={i} style={{display:'flex', justifyContent:'space-between', padding:'12px', borderBottom:'1px solid #222', fontSize:13}}>
                                        <span>{b.firstName} {b.lastName} ({b.members || 1})</span>
                                        <span style={{color:'var(--saffron)', fontWeight:'bold'}}>{SLOT_DATA.find(s=>s.id==parseInt(b.slotId))?.time}</span>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div>
                                <div className="help-card"><div className="help-info"><p>Nishant Kamani</p></div><a href="tel:9016851030" className="num-box">📞 9016851030</a></div>
                                <div className="help-card"><div className="help-info"><p>Kyada Het</p></div><a href="tel:6354108823" className="num-box">📞 6354108823</a></div>
                                <div className="help-card"><div className="help-info"><p>Limbasiya Amit</p></div><a href="tel:6351267326" className="num-box">📞 6351267326</a></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
